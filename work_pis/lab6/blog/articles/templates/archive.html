<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Архив всех статей</title>
        <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
    </head>
	<div class="header">
    <div class="auth-links">
        <a href="{% url register %}">Регистрация</a>
        <a href="{% url login %}">Вход</a>
    </div>
</div>
    <body class="archive">
        <div class="header">
            <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип">
        </div>
        <div class="archive">
            {% for post in posts %}
            <div class="one-post">
                <h2 class="post-title">
                    <a href="{% url get_article post.id %}">{{ post.title }}</a>
                </h2>
                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>
            </div>
            {% endfor %}
        </div>
    </body>
</html>
