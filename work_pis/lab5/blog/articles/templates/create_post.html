<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Создать статью</title>
        <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
    </head>
    <body class="create-post">
        <div class="header">
            <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип">
        </div>
        <div class="content">
            <h1>Написать статью</h1>
            <form method="post">
                {% csrf_token %}
                <input type="text" name="title" placeholder="Название статьи" value="{{ form.title }}">
                <textarea name="text" placeholder="Текст статьи">{{ form.text }}</textarea>
                <input type="submit" value="Сохранить">
            </form>
            {% if form.errors %}
                <div class="errors">{{ form.errors }}</div>
            {% endif %}
        </div>
    </body>
</html>
